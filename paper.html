<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>語意比對文章工具（Semantic Similarity）</title>
<style>
body { font-family: Arial; margin: 30px; }
textarea { width: 100%; height: 150px; margin-bottom: 20px; }
button { padding: 10px 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
tr.high-similarity { background-color: #ffcccc; }
</style>
</head>
<body>

<h2>語意比對文章工具（Semantic Similarity）</h2>

<label>文章 1：</label><br>
<textarea id="text1"></textarea><br>

<label>文章 2：</label><br>
<textarea id="text2"></textarea><br>

<label>相似度門檻 (%): </label>
<input type="number" id="threshold" value="70" min="0" max="100"><br><br>

<button onclick="compare()">比對文章</button>

<h3 id="overall"></h3>
<table id="resultTable" style="display:none;">
<tr>
    <th>文章 1 段落</th>
    <th>匹配文章 2 段落</th>
    <th>相似度 (%)</th>
</tr>
</table>

<!-- TensorFlow.js + USE-lite -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/universal-sentence-encoder@1.3.3/dist/universal-sentence-encoder.min.js"></script>

<script>
let model = null;

// 載入模型
use.load().then(m => {
    model = m;
    console.log("USE-lite 模型已載入");
});

// 計算兩向量餘弦相似度
function cosineSimilarity(v1, v2) {
    const dot = v1.dot(v2).dataSync()[0];
    const norm1 = v1.norm().dataSync()[0];
    const norm2 = v2.norm().dataSync()[0];
    return dot / (norm1 * norm2);
}

// 比對文章
async function compare() {
    if (!model) {
        alert("模型尚未載入，請稍等...");
        return;
    }

    const text1 = document.getElementById("text1").value.trim();
    const text2 = document.getElementById("text2").value.trim();
    const threshold = Number(document.getElementById("threshold").value);

    const para1 = text1.split("\n").filter(p=>p.trim());
    const para2 = text2.split("\n").filter(p=>p.trim());

    if (para1.length===0 || para2.length===0) {
        alert("請輸入文章內容");
        return;
    }

    // 將段落生成向量
    const embeddings1 = await model.embed(para1);
    const embeddings2 = await model.embed(para2);

    let results = [];
    let totalSim = 0;

    for (let i=0;i<para1.length;i++) {
        let maxSim = 0;
        let matched = "";
        for (let j=0;j<para2.length;j++) {
            const sim = cosineSimilarity(embeddings1.gather(i), embeddings2.gather(j));
            if (sim > maxSim) {
                maxSim = sim;
                matched = para2[j];
            }
        }
        totalSim += maxSim;
        results.push({paragraph: para1[i], matched: matched, similarity: Math.round(maxSim*100)});
    }

    const overallSim = para1.length ? Math.round(totalSim / para1.length * 100) : 0;
    document.getElementById("overall").innerHTML = `整篇相似度：<b>${overallSim}%</b>`;

    // 顯示表格
    const table = document.getElementById("resultTable");
    table.style.display = "table";
    table.innerHTML = `<tr>
        <th>文章 1 段落</th>
        <th>匹配文章 2 段落</th>
        <th>相似度 (%)</th>
    </tr>`;
    results.forEach(r=>{
        const row = table.insertRow();
        if (r.similarity >= threshold) row.classList.add("high-similarity");
        row.insertCell(0).innerText = r.paragraph;
        row.insertCell(1).innerText = r.matched;
        row.insertCell(2).innerText = r.similarity;
    });
}
</script>

<p style="color:red;">紅色標記：相似度高於門檻的段落，可能抄襲</p>

</body>
</html>
