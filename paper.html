<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>升級版文章比對工具</title>
<style>
body { font-family: Arial; margin: 30px; }
textarea { width: 100%; height: 150px; margin-bottom: 20px; }
button { padding: 10px 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
tr.high-similarity { background-color: #ffcccc; }
</style>
</head>
<body>

<h2>升級版文章比對工具（純網頁）</h2>

<label>文章 1：</label><br>
<textarea id="text1"></textarea><br>

<label>文章 2：</label><br>
<textarea id="text2"></textarea><br>

<label>相似度門檻 (%): </label>
<input type="number" id="threshold" value="70" min="0" max="100"><br><br>

<button onclick="compare()">比對文章</button>

<h3 id="overall"></h3>
<table id="resultTable" style="display:none;">
<tr>
    <th>文章 1 段落</th>
    <th>匹配文章 2 段落</th>
    <th>相似度 (%)</th>
</tr>
</table>

<script src="https://unpkg.com/jieba-js/dist/jieba.min.js"></script>
<script>
// 中文分詞 + Jaccard 相似度
function tokenize(text) {
    text = text.replace(/\s+/g,''); // 去空格
    return jieba.cut(text); // jieba-js 分詞
}

function jaccardSimilarity(text1, text2) {
    const words1 = new Set(tokenize(text1));
    const words2 = new Set(tokenize(text2));
    const intersection = new Set([...words1].filter(x => words2.has(x)));
    const union = new Set([...words1, ...words2]);
    return union.size ? intersection.size / union.size : 0;
}

function compare() {
    const text1 = document.getElementById("text1").value.trim();
    const text2 = document.getElementById("text2").value.trim();
    const threshold = Number(document.getElementById("threshold").value);

    const para1 = text1.split("\n").filter(p=>p.trim());
    const para2 = text2.split("\n").filter(p=>p.trim());

    let results = [];
    let totalSim = 0;

    para1.forEach(p1 => {
        let maxSim = 0;
        let matched = "";
        para2.forEach(p2 => {
            let sim = jaccardSimilarity(p1,p2);
            if (sim > maxSim) {
                maxSim = sim;
                matched = p2;
            }
        });
        totalSim += maxSim;
        results.push({paragraph: p1, matched: matched, similarity: Math.round(maxSim*100)});
    });

    const overallSim = para1.length ? Math.round(totalSim / para1.length * 100) : 0;
    document.getElementById("overall").innerHTML = `整篇相似度：<b>${overallSim}%</b>`;

    // 顯示表格
    const table = document.getElementById("resultTable");
    table.style.display = "table";
    table.innerHTML = `<tr>
        <th>文章 1 段落</th>
        <th>匹配文章 2 段落</th>
        <th>相似度 (%)</th>
    </tr>`;
    results.forEach(r=>{
        const row = table.insertRow();
        if (r.similarity >= threshold) row.classList.add("high-similarity");
        row.insertCell(0).innerText = r.paragraph;
        row.insertCell(1).innerText = r.matched;
        row.insertCell(2).innerText = r.similarity;
    });
}
</script>

<p style="color:red;">紅色標記：相似度高於門檻的段落，可能抄襲</p>

</body>
</html>
